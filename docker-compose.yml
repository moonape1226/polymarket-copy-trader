services:
  copy-trader:
    container_name: polymarket-bot
    image: polymarket-copy-trader
    build: .
    restart: unless-stopped
    env_file:
      - .env                          # POLYMARKET_PRIVATE_KEY, POLYMARKET_PROXY_ADDRESS
    volumes:
      - ./config.json:/app/config.json:ro   # edit wallets/settings without rebuilding
      - ./data:/app/data                    # bot trade log output
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  market-scanner:
    container_name: polymarket-scanner
    build:
      context: ./scanner
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  trade-logger:
    container_name: polymarket-logger
    build:
      context: ./tracker
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  weather-predictor:
    container_name: polymarket-weather
    build:
      context: .
      dockerfile: weather_predictor/Dockerfile
    restart: unless-stopped
    environment:
      - DATA_DIR=/data
    volumes:
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  book-logger:
    container_name: polymarket-book-logger
    build:
      context: ./book_logger
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/data
    environment:
      - BOOK_LOGGER_DATA_DIR=/data/book_logger
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
